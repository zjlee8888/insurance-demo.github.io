  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Capture errors silently — log to the console only so clients never see
  // an on-page error overlay. Errors remain available in devtools for debugging.
  window.addEventListener('error', function(e) {
    console.error('[bundle]', (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : ''));
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      if (loading) loading.style.display = 'none';
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    if (loading) loading.style.display = 'none';
    console.error('Bundle unpack error:', err);
  }
});

e>\n<style>\n  html,body{margin:0;padding:0;background:#231815;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}\n  *{box-sizing:border-box;}\n  @keyframes feFieldIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}\n  @keyframes feStamp{0%{opacity:0;transform:scale(.3);}60%{transform:scale(1.14);}100%{opacity:1;transform:scale(1);}}\n  @keyframes feStampIn{0%{opacity:0;transform:scale(1.5) rotate(-12deg);}100%{opacity:1;transform:scale(1) rotate(-8deg);}}\n  @keyframes feRing{0%{transform:scale(.65);opacity:.55;}100%{transform:scale(2);opacity:0;}}\n  @keyframes feSweep{0%{transform:translateY(-130%);}100%{transform:translateY(230%);}}\n  @keyframes feSlideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}\n  @keyframes feFade{from{opacity:0;}to{opacity:1;}}\n  @keyframes feSpin{to{transform:rotate(360deg);}}\n  @keyframes feGlow{0%,100%{box-shadow:0 0 0 0 rgba(254,210,0,0);}50%{box-shadow:0 0 44px 8px rgba(254,210,0,.42);}}\n  @keyframes feDrawer{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}\n  @keyframes feRowIn{0%{opacity:0;transform:translateY(12px) scale(.985);}100%{opacity:1;transform:translateY(0) scale(1);}}\n  @keyframes feWash{0%{transform:translateX(-120%);opacity:0;}25%{opacity:.7;}100%{transform:translateX(120%);opacity:0;}}\n  @keyframes feShimmer{0%{transform:translateX(-100%);}100%{transform:translateX(320%);}}\n  @keyframes feDot{0%,70%,100%{opacity:.18;transform:translateY(0);}35%{opacity:1;transform:translateY(-2px);}}\n  @keyframes feChipLit{0%{box-shadow:0 0 0 0 rgba(254,210,0,.55);}100%{box-shadow:0 0 0 7px rgba(254,210,0,0);}}\n  @keyframes fePulse{0%,100%{opacity:.35;transform:scale(.8);}50%{opacity:1;transform:scale(1);}}\n  @keyframes feScanline{0%{top:0;opacity:0;}10%{opacity:.9;}100%{top:100%;opacity:0;}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"--yellow:#FED200;--blue:#1A52C1;--orange:#F96328;--ink:#231815;--ink-2:#3A2F2B;--ink- ation/json<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:var(--fd);font-weight:600;font-size:14px;color:var(--paper);margin-bottom:12px;\">{{ jsonModal.title }}<\u002Fdiv>\n        <pre style=\"margin:0 0 14px;flex:1;overflow:auto;background:rgba(0,0,0,.28);border:1px solid rgba(255,253,245,.12);border-radius:10px;padding:14px;font-family:var(--fm);font-size:11.5px;line-height:1.6;color:#FFF7D1;white-space:pre;\">{{ jsonModal.text }}<\u002Fpre>\n        <button onclick=\"{{ closeJson }}\" style=\"border:1px solid rgba(255,253,245,.3);background:transparent;color:var(--paper);font-family:var(--fd);font-weight:600;font-size:13px;padding:11px;border-radius:10px;cursor:pointer;\">Close<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.scrollRef = React.createRef();\n    this.state = { screen:'home', journey:null, setupIdx:0, revealed:0, timer:0, loadingDone:false, loadPct:0, loadMsg:'', litStage:0, autoplay:false, tooltip:null, detail:null, json:null };\n    this.reduced = false; this._timers = []; this._prevScreen='home'; this._prevRevealed=0; this._prevLoading=false;\n  }\n\n  SOURCES = {\n    MPS:      { short:'MPS', full:'Ministry of Public Security', jurisdiction:'Mainland China · national authority', turnaround:'Real-time', consent:'Required',\n      desc:'China\\u2019s registry of record for identity. Matches name, ID number, issue and expiry dates and the portrait against the official ID card, and reports the card\\u2019s current status — active, expired, reported lost, or revoked.' },\n    NIA:      { short:'Immigration', full:'National Immigration Administration', jurisdiction:'Mainland China', turnaround:'Real-time', consent:'Required',\n      desc:'Verifies the authenticity of passports, exit-entry and travel permits, and retrieves the individual\\u2019s off ckground: S.autoplay?'var(--yellow)':'transparent', color: S.autoplay?'var(--ink)':'rgba(255,253,245,.82)', border: S.autoplay?'1px solid var(--yellow)':'1px solid rgba(255,253,245,.28)', fontFamily:\"var(--fd)\", fontWeight:600, fontSize:'13px', padding:'9px 16px', borderRadius:'999px', cursor:'pointer', transition:'all .18s' },\n      autoplayDotStyle:{ width:'7px', height:'7px', borderRadius:'999px', background: S.autoplay?'var(--blue)':'rgba(255,253,245,.5)' },\n      reset:()=>this.reset(),\n      pickClient:()=>this.pick('client'), pickAgent:()=>this.pick('agent'), pickClaims:()=>this.pick('claims'),\n      setup,\n      tapPersonaTag: j ? j.personaTag : '',\n      doTap:()=>this.doTap(), consentSign:()=>this.consentSign(),\n      sourceRail, viewForms, caption: j?j.caption:'', decision, footer,\n      loaderChips, loaderRingStyle, loadPct: S.loadPct + '%', loadMsg: S.loadMsg, loadCount: litCount + ' / ' + railOrder.length + ' sources',\n      tip, closeTip:()=>this.closeTip(), stop:(e)=>{ if(e&&e.stopPropagation)e.stopPropagation(); },\n      field, closeField:()=>this.closeField(),\n      json, closeJson:()=>this.closeJson(),\n      scrollRef: this.scrollRef,\n    };\n  }\n\n  btnSignal() { return { width:'100%', border:'1px solid var(--ink)', background:'var(--yellow)', color:'var(--blue)', fontFamily:\"var(--fd)\", fontWeight:700, fontSize:'15px', padding:'14px', borderRadius:'12px', cursor:'pointer' }; }\n  btnInk() { return { width:'100%', border:'none', background:'var(--ink)', color:'var(--paper)', fontFamily:\"var(--fd)\", fontWeight:600, fontSize:'15px', padding:'14px', borderRadius:'12px', cursor:'pointer' }; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
